<div class="cookie-banner" id="cookie-banner" hidden>
  <div class="wrap cookie-banner-inner">
    <p>
      Używamy plików cookie. Niezbędne są potrzebne do działania strony, a analityczne (Google Analytics)
      pomagają nam sprawdzić, ile osób nas odwiedza. Wybierz, na co się zgadzasz — zapamiętamy to w tej przeglądarce.
    </p>
    <div class="cookie-banner-actions">
      <button type="button" id="cookie-reject" class="cookie-btn cookie-btn-ghost">Nie wyrażam zgody</button>
      <button type="button" id="cookie-necessary" class="cookie-btn cookie-btn-outline">Tylko niezbędne</button>
      <button type="button" id="cookie-accept" class="cookie-btn cookie-btn-solid">Zaakceptuj wszystkie</button>
    </div>
  </div>
</div>
